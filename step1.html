<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Step 1">
  <meta name="theme-color" content="#f5efe6">
  <title>Step 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-overlay"></div>
  <div class="floating-container" id="floating-container">
    <div class="floating-blob blob-1"></div>
    <div class="floating-blob blob-2"></div>
    <div class="floating-blob blob-3"></div>
  </div>
  <div class="page-wrapper">
    <div class="step-container">
      <div class="step-indicator">
        <span class="step-dot active"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
        <span class="step-dot"></span>
      </div>
      <p class="step-label">step one</p>

      <section class="step-section" id="message-section">
        <div class="message-lines">
          <p class="message-line">okay&#8230; let&#8217;s start simple</p>
          <p class="message-line accent">you made it here, not bad &#x1F60C;</p>
        </div>
        <button class="btn-primary" id="im-here-btn" style="opacity:0;">I&#8217;m here &#x1F60C;</button>
      </section>

      <section class="step-section hidden" id="upload-section">
        <p class="message-line" style="opacity:1;transform:none;font-size:1.1rem;">prove it &#x1F4F8;</p>
        <div class="upload-zone" id="upload-zone">
          <input type="file" accept="image/*" id="file-input" hidden>
          <div class="upload-placeholder">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
            <p>tap to take a selfie</p>
          </div>
          <img id="upload-preview" class="upload-preview" alt="Preview"/>
        </div>
        <button class="btn-primary" id="submit-btn" style="display:none;">send it &#x1F4F8;</button>
      </section>

      <section class="step-section hidden" id="waiting-section">
        <div class="waiting-content">
          <p class="waiting-text">hmm let me verify this &#x1F60C;</p>
          <div class="loading-dots"><span></span><span></span><span></span></div>
          <div class="doodle-container"></div>
        </div>
      </section>

      <section class="step-section hidden" id="clue-section">
        <div class="success-message" style="transform:translateY(10px);">
          <p class="success-text"></p>
        </div>
        <div class="clue-card">
          <p class="clue-label">next stop</p>
          <p class="clue-text"></p>
        </div>
        <a href="step2.html" class="btn-primary" id="continue-btn" style="opacity:0;">continue &#8594;</a>
      </section>

      <section class="step-section hidden" id="completed-section">
        <div class="completed-state">
          <p>already done &#10003;</p>
          <p style="font-size:0.9rem;font-style:italic;">taking you to the next one&#8230;</p>
        </div>
      </section>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="firebase-config.js"></script>
  <script src="animations.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() { StepApp.init('step1'); });
  </script>
</body>
</html>
