<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A special treasure hunt just for you">
  <meta name="theme-color" content="#f5efe6">
  <title>Treasure Hunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-overlay"></div>
  <div class="page-wrapper">
    <div class="step-container" style="gap:20px;">
      <p class="message-line" style="opacity:0;">finding your place&#8230;</p>
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p class="step-label" style="opacity:0;">one moment</p>
    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="firebase-config.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var overlay = document.querySelector('.page-overlay');
      gsap.to(overlay, { opacity: 0, duration: 0.5, onComplete: function() { overlay.style.pointerEvents = 'none'; } });
      gsap.to('.message-line', { opacity: 1, y: 0, duration: 0.6, delay: 0.3 });
      gsap.to('.step-label', { opacity: 1, duration: 0.6, delay: 0.6 });

      var pageMap = { step1:'step1.html', step2:'step2.html', step3:'step3.html', step4:'step4.html', final:'final.html' };

      getCurrentStep().then(function(step) {
        var target = pageMap[step] || 'step1.html';
        setTimeout(function() {
          gsap.to(overlay, { opacity: 1, duration: 0.4, onComplete: function() { window.location.href = target; } });
        }, 1000);
      }).catch(function() {
        setTimeout(function() { window.location.href = 'step1.html'; }, 1500);
      });
    });
  </script>
</body>
</html>
